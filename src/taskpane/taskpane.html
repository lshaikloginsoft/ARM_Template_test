<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Report Phishing</title>

    <!-- Office JS -->
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <link rel="stylesheet" href="taskpane.css">
</head>

<body>
  <div class="container">
    <h2>Confirm Report</h2>

    <hr />

    <p id="confirmText" class="confirm-text">Are you sure you want to report this email as phishing?</p>

    <div class="button-row">
      <button id="reportBtn" class="btn btn-primary">
        Confirm
      </button>

      <button id="cancelBtn" class="btn btn-cancel">
        Cancel
      </button>
    </div>

    <div id="progressContainer" style="display:none; margin-top: 12px;">
      <div id="progressMsg" style="color:#2b59c3; font-size:13px; margin-bottom:6px;"></div>
      <div class="spinner"></div>
    </div>

    <p id="status" class="status"></p>
  </div>
</body>
</html>
